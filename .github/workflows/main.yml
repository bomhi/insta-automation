name: WorldFolio_System

concurrency:
  group: world-folio-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - upload

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # 파이썬 최신화 (경고 제거)

      - name: Install dependencies
        run: pip install Pillow requests beautifulsoup4 google-generativeai

      # 1단계: 이미지 생성 (여기에 GEMINI_API_KEY 다리 연결!)
      - name: Generate Content
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python src/generator.py --generate

      # 2단계: 강력한 동기화 및 푸시
      - name: Commit and Push
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          git rm -f summary.txt --ignore-unmatch
          git add images/ biz_summary.txt sci_summary.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Prepare news content for review"
            git pull --rebase -X ours origin main
            git push origin main
          else
            echo "No changes to commit"
          fi

      # 3단계: 인스타그램 업로드
      - name: Upload to Instagram
        if: github.event.inputs.action == 'upload'
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python src/generator.py --upload
