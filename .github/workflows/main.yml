name: InstaAuto
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # v3에서 v4로 업데이트

      - name: Set up Python
        uses: actions/setup-python@v5  # v4에서 v5로 업데이트
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install Pillow requests  # requests 라이브러리 추가 설치

      - name: Run generator
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
          INSTA_CAPTION: ${{ secrets.INSTA_CAPTION }}
        run: python src/generator.py

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add images/
          git commit -m "Auto-generate card" || echo "No changes to commit"
          git push
