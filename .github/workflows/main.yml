name: WorldFolio_System

concurrency:
  group: world-folio-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - upload
      target_category:
        description: '[Upload 전용] 업로드할 기사를 선택하세요'
        required: false
        default: 'biz'
        type: choice
        options:
          - biz
          - sci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow requests beautifulsoup4 google-generativeai

      # 1단계: 콘텐츠 생성
      - name: Generate Content
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python src/generator.py --generate

      # [수정] 파일이 있든 없든 에러 없이 생성된 것만 골라서 커밋하는 지능형 로직
      - name: Commit and Push
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 이미지가 생성되었다면 폴더 통째로 추가
          if [ -d "images" ]; then git add images/; fi
          
          # 존재하는 텍스트 파일만 골라서 추가 (에러 방지)
          if [ -f "biz_summary.txt" ]; then git add biz_summary.txt; fi
          if [ -f "sci_summary.txt" ]; then git add sci_summary.txt; fi
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update news content (Auto-generated)"
            git pull --rebase -X ours origin main
            git push origin main
            echo "✅ 파일이 저장소에 성공적으로 반영되었습니다."
          else
            echo "⚠️ 새로 생성된 파일이 없어 커밋을 생략합니다."
          fi

      # 2단계: 선택한 카테고리 업로드
      - name: Upload to Instagram
        if: github.event.inputs.action == 'upload'
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python src/generator.py --upload ${{ github.event.inputs.target_category }}
