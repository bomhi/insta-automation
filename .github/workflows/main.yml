name: WorldFolio_System

# 중복 실행 방지: 여러 번 클릭해도 하나씩 순서대로 처리합니다.
concurrency:
  group: world-folio-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - upload

jobs:
  build:
    runs-on: ubuntu-latest
    # 권한 설정 (푸시 에러 방지)
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 과거 기록까지 다 가져와야 동기화가 잘 됩니다.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install Pillow requests deep-translator beautifulsoup4

      # 1단계: 이미지 생성
      - name: Generate Content
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python src/generator.py --generate

      # 2단계: 강력한 동기화 및 푸시 (수정된 부분)
      - name: Commit and Push
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # [핵심 수정] 기존 파일 삭제 후, 투트랙(경제/과학) 파일 모두 깃허브에 추가
          git rm -f summary.txt --ignore-unmatch
          git add images/ biz_summary.txt sci_summary.txt
          
          # 변경사항이 있을 때만 실행
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Prepare news content for review"
            
            # 푸시 직전에 서버의 최신본을 다시 가져와서 내 커밋을 그 위에 얹습니다.
            # 충돌 발생 시 '우리의 것(방금 만든 사진)'을 우선시합니다.
            git pull --rebase -X ours origin main
            
            git push origin main
          else
            echo "No changes to commit"
          fi

      # 3단계: 인스타그램 업로드
      - name: Upload to Instagram
        if: github.event.inputs.action == 'upload'
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python src/generator.py --upload
