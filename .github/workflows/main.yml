name: WorldFolio_System

concurrency:
  group: world-folio-group
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'generate'
        type: choice
        options:
          - generate
          - upload
      target_category:
        description: '[Upload 전용] 업로드할 기사를 선택하세요'
        required: false
        default: 'biz'
        type: choice
        options:
          - biz
          - sci

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow requests beautifulsoup4 google-generativeai

      # 1단계: 콘텐츠 생성 및 깃허브 저장
      - name: Generate Content
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} 
        run: python src/generator.py --generate

      - name: Commit and Push
        if: github.event.inputs.action == 'generate' || github.event_name == 'schedule'
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          git add images/ biz_summary.txt sci_summary.txt
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Prepare news content for review"
            git pull --rebase -X ours origin main
            git push origin main
          else
            echo "No changes to commit"
          fi

      # 2단계: 선택한 카테고리만 인스타그램에 업로드!
      - name: Upload to Instagram
        if: github.event.inputs.action == 'upload'
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        # 드롭다운에서 선택한 'target_category(biz/sci)'를 파이썬 스크립트에 전달
        run: python src/generator.py --upload ${{ github.event.inputs.target_category }}
