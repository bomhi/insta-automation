name: InstaAuto

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install Pillow requests deep-translator

      # 1단계: 이미지 생성만 수행
      - name: Generate Images
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python src/generator.py --generate

      # 2단계: 생성된 이미지를 GitHub 저장소에 먼저 올림 (매우 중요!)
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add images/
          git commit -m "Auto-generate news images" || echo "No changes"
          git push

      # 3단계: 이미지가 인터넷(GitHub)에 올라온 후 인스타그램에 업로드 명령
      - name: Upload to Instagram
        env:
          INSTA_USER_ID: ${{ secrets.INSTA_USER_ID }}
          INSTA_ACCESS_TOKEN: ${{ secrets.INSTA_ACCESS_TOKEN }}
        run: python src/generator.py --upload
